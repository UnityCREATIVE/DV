<!-- Real-time Data Binding & Sanitization Script -->
<script>
  function toggleSchedule() {
    const type = document.querySelector('input[name="scheduleType"]:checked').value;
    if (type === 'single') {
      document.getElementById('singleDateFields').style.display = 'grid';
      document.getElementById('multiDateFields').style.display = 'none';
    } else {
      document.getElementById('singleDateFields').style.display = 'none';
      document.getElementById('multiDateFields').style.display = 'block';
    }
    updatePreview();
  }

  // Sanitization Engine
  function formatTime(val) {
    if (!val) return '';
    // Forces uppercase, removes weird spacing, and ensures exactly one space before AM/PM
    return val.trim().toUpperCase()
              .replace(/\./g, '') // Removes periods (e.g., P.M. becomes PM)
              .replace(/\s+(AM|PM)/g, '$1') // Temporarily squishes it (2 PM becomes 2PM)
              .replace(/([0-9])(AM|PM)/g, '$1 $2'); // Forces the perfect space (2PM becomes 2 PM)
  }

  function formatDate(val) {
    if (!val) return '';
    // Forces the entire date string to uppercase for that premium cinematic look
    return val.trim().toUpperCase();
  }

  function updatePreview() {
    // Text Inputs
    const studio = document.getElementById('studioInput').value;
    const title = document.getElementById('titleInput').value;
    const tagline = document.getElementById('taglineInput').value;
    const venue = document.getElementById('venueInput').value;
    const city = document.getElementById('cityInput').value;

    // Update Basic Text
    document.getElementById('pv-studio').innerText = studio || 'Your Studio Name';
    document.getElementById('pv-title').innerText = title || 'Event Title Here';

    // Handle Tagline Display
    const tagEl = document.getElementById('pv-tagline');
    if (tagline) {
      tagEl.innerText = tagline;
      tagEl.style.display = 'block';
    } else {
      tagEl.style.display = 'none';
    }

    // Handle Location Formatting
    let locationStr = venue ? venue.toUpperCase() : 'VENUE NAME';
    if (city) { locationStr += ' — ' + city.toUpperCase(); }
    document.getElementById('pv-venue').innerText = locationStr;

    // Handle Date/Time Logic based on Radio Button
    const isSingle = document.querySelector('input[name="scheduleType"]:checked').value === 'single';
    let dateTimeStr = '';
    
    if (isSingle) {
      const d = formatDate(document.getElementById('dateInput').value);
      const t = formatTime(document.getElementById('timeInput').value);
      
      if (d && t) dateTimeStr = d + ' • ' + t;
      else if (d) dateTimeStr = d;
      else if (t) dateTimeStr = t;
      else dateTimeStr = 'DATE • TIME';
    } else {
      dateTimeStr = formatDate(document.getElementById('multiDateInput').value) || 'DATE RANGE';
    }
    
    document.getElementById('pv-datetime').innerText = dateTimeStr;
  }
</script>
